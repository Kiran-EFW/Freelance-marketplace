# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from the /auth/verify-otp or /auth/refresh endpoints.

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      description: User ID
      schema:
        type: string
      example: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"

    ProviderIdPath:
      name: id
      in: path
      required: true
      description: Provider (user) ID
      schema:
        type: string
      example: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"

    JobIdPath:
      name: id
      in: path
      required: true
      description: Job ID
      schema:
        type: string
      example: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"

    PaymentIdPath:
      name: id
      in: path
      required: true
      description: Payment ID
      schema:
        type: string
      example: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"

    DisputeIdPath:
      name: id
      in: path
      required: true
      description: Dispute ID
      schema:
        type: string
      example: "dsp_01HS8PKFP3R7E3DYGZM2PFWT4E"

    CategorySlugPath:
      name: slug
      in: path
      required: true
      description: Category URL slug
      schema:
        type: string
      example: plumbing

    RouteIdPath:
      name: id
      in: path
      required: true
      description: Route ID
      schema:
        type: string
      example: "rte_01HT2NKFP3R7E3DYGZM2PFWT4F"

    ReviewIdPath:
      name: id
      in: path
      required: true
      description: Review ID
      schema:
        type: string
      example: "rev_01HS2NKFP3R7E3DYGZM2PFWT4C"

    NotificationIdPath:
      name: id
      in: path
      required: true
      description: Notification ID
      schema:
        type: string
      example: "ntf_01HT5PKFP3R7E3DYGZM2PFWT4G"

    PageQuery:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

    LimitQuery:
      name: limit
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Bad request — invalid input or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: BAD_REQUEST
            message: Invalid request parameters
            details:
              - field: phone
                message: Phone number must include country code

    Unauthorized:
      description: Unauthorized — missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: UNAUTHORIZED
            message: Authentication required
            details: null

    Forbidden:
      description: Forbidden — insufficient permissions for the requested action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: FORBIDDEN
            message: You do not have permission to perform this action
            details: null

    NotFound:
      description: Not found — the requested resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: NOT_FOUND
            message: Resource not found
            details: null

    UnprocessableEntity:
      description: Unprocessable entity — the request is well-formed but semantically invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: UNPROCESSABLE_ENTITY
            message: Validation failed
            details:
              - field: rating
                message: Rating must be between 1 and 5

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: INTERNAL_SERVER_ERROR
            message: An unexpected error occurred
            details: null

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # --- Health ---
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        timestamp:
          type: string
          format: date-time

    ReadinessResponse:
      type: object
      required: [status, checks, timestamp]
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, failed]
        timestamp:
          type: string
          format: date-time

    # --- Auth ---
    OTPRequest:
      type: object
      required: [phone, jurisdiction_id]
      properties:
        phone:
          type: string
          description: Phone number with country code (E.164 format)
          pattern: '^\+[1-9]\d{6,14}$'
          examples:
            - "+919876543210"
        jurisdiction_id:
          type: string
          description: Jurisdiction identifier (ISO 3166-2 code)
          examples:
            - "IN-KA"

    OTPVerify:
      type: object
      required: [phone, otp]
      properties:
        phone:
          type: string
          description: Phone number with country code (E.164 format)
          pattern: '^\+[1-9]\d{6,14}$'
          examples:
            - "+919876543210"
        otp:
          type: string
          description: One-time password (6 digits)
          pattern: '^\d{6}$'
          examples:
            - "482916"

    TokenResponse:
      type: object
      required: [access_token, refresh_token, expires_in]
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: JWT refresh token for obtaining new access tokens
        expires_in:
          type: integer
          description: Access token validity in seconds
          examples:
            - 3600

    # --- Users ---
    UserType:
      type: string
      enum: [customer, provider, admin]
      description: The role type of the user

    DeviceType:
      type: string
      enum: [android, ios, web]
      description: Device type the user registered from

    User:
      type: object
      required: [id, type, phone, name, jurisdiction_id, created_at]
      properties:
        id:
          type: string
          description: Unique user identifier (ULID)
          examples:
            - "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
        type:
          $ref: "#/components/schemas/UserType"
        phone:
          type: string
          description: Phone number (E.164 format)
          examples:
            - "+919876543210"
        email:
          type: string
          format: email
          description: Email address (optional)
          examples:
            - "priya@example.com"
        name:
          type: string
          description: Full name
          minLength: 1
          maxLength: 200
          examples:
            - "Priya Sharma"
        jurisdiction_id:
          type: string
          description: Jurisdiction identifier (ISO 3166-2)
          examples:
            - "IN-KA"
        preferred_language:
          type: string
          description: Preferred language (ISO 639-1)
          default: en
          examples:
            - "en"
        device_type:
          $ref: "#/components/schemas/DeviceType"
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp

    UserUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
        preferred_language:
          type: string
          description: ISO 639-1 language code
        device_type:
          $ref: "#/components/schemas/DeviceType"

    # --- Providers ---
    VerificationStatus:
      type: string
      enum: [pending, verified, rejected, suspended]
      description: Provider identity verification status

    ProviderLevel:
      type: string
      enum: [beginner, intermediate, expert, master]
      description: Provider skill level based on completed jobs and ratings

    ProviderProfile:
      type: object
      required:
        - user_id
        - skills
        - service_radius_km
        - postcode
        - latitude
        - longitude
        - trust_score
        - level
        - verification_status
      properties:
        user_id:
          type: string
          description: User ID of the provider
          examples:
            - "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
        skills:
          type: array
          items:
            type: string
          description: List of skill slugs
          examples:
            - ["plumbing", "pipe-fitting"]
        service_radius_km:
          type: number
          format: double
          description: Maximum distance in km the provider is willing to travel
          minimum: 1
          maximum: 100
          examples:
            - 15
        postcode:
          type: string
          description: Provider's base postcode / PIN code
          examples:
            - "560001"
        latitude:
          type: number
          format: double
          description: Provider's base latitude
          minimum: -90
          maximum: 90
          examples:
            - 12.9716
        longitude:
          type: number
          format: double
          description: Provider's base longitude
          minimum: -180
          maximum: 180
          examples:
            - 77.5946
        trust_score:
          type: number
          format: double
          description: Computed trust score (0.0 - 5.0)
          minimum: 0
          maximum: 5
          examples:
            - 4.8
        level:
          $ref: "#/components/schemas/ProviderLevel"
        verification_status:
          $ref: "#/components/schemas/VerificationStatus"
        availability_schedule:
          $ref: "#/components/schemas/AvailabilitySchedule"

    ProviderRegistration:
      type: object
      required: [skills, service_radius_km, postcode, latitude, longitude]
      properties:
        skills:
          type: array
          items:
            type: string
          minItems: 1
          description: List of skill slugs
        service_radius_km:
          type: number
          format: double
          minimum: 1
          maximum: 100
        postcode:
          type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180

    ProviderUpdate:
      type: object
      properties:
        skills:
          type: array
          items:
            type: string
          minItems: 1
        service_radius_km:
          type: number
          format: double
          minimum: 1
          maximum: 100
        postcode:
          type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180

    TimeSlot:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          description: Start time in HH:MM format (24h)
          pattern: '^\d{2}:\d{2}$'
          examples:
            - "09:00"
        end:
          type: string
          description: End time in HH:MM format (24h)
          pattern: '^\d{2}:\d{2}$'
          examples:
            - "18:00"

    AvailabilitySchedule:
      type: object
      description: Weekly availability schedule. Null values indicate the provider is unavailable on that day.
      properties:
        monday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        tuesday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        wednesday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        thursday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        friday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        saturday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"
        sunday:
          oneOf:
            - $ref: "#/components/schemas/TimeSlot"
            - type: "null"

    # --- Jobs ---
    JobStatus:
      type: string
      enum:
        - pending
        - quoted
        - accepted
        - in_progress
        - completed
        - cancelled
        - disputed
      description: |
        Job lifecycle states:
        - pending: Newly created, awaiting quotes or assignment
        - quoted: At least one provider has submitted a quote
        - accepted: A provider has been assigned and accepted
        - in_progress: Work has started
        - completed: Work finished successfully
        - cancelled: Job was cancelled
        - disputed: A dispute has been raised

    PaymentMethod:
      type: string
      enum: [online, cash, wallet]
      description: How the job will be paid

    Job:
      type: object
      required:
        - id
        - customer_id
        - category_id
        - postcode
        - latitude
        - longitude
        - status
        - description
        - currency
        - payment_method
        - is_recurring
        - jurisdiction_id
        - created_at
      properties:
        id:
          type: string
          description: Unique job identifier
          examples:
            - "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
        customer_id:
          type: string
          description: ID of the customer who created the job
          examples:
            - "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
        provider_id:
          type: string
          description: ID of the assigned provider (null if unassigned)
          examples:
            - "usr_01HQXK5V8R3N0E7YGZM2PFWT4B"
        category_id:
          type: string
          description: Service category ID
          examples:
            - "cat_plumbing"
        postcode:
          type: string
          description: Job location postcode
          examples:
            - "560001"
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          examples:
            - 12.9716
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          examples:
            - 77.5946
        status:
          $ref: "#/components/schemas/JobStatus"
        description:
          type: string
          description: Detailed description of the work needed
          maxLength: 2000
          examples:
            - "Kitchen sink leaking, need urgent repair"
        scheduled_at:
          type: string
          format: date-time
          description: Requested date and time for the job
        quoted_price:
          type: number
          format: double
          description: Price quoted by the provider
        final_price:
          type: number
          format: double
          description: Final agreed / actual price after completion
        currency:
          type: string
          description: ISO 4217 currency code
          default: INR
          examples:
            - "INR"
        payment_method:
          $ref: "#/components/schemas/PaymentMethod"
        is_recurring:
          type: boolean
          description: Whether this is a recurring job
          default: false
        jurisdiction_id:
          type: string
          description: Jurisdiction identifier (ISO 3166-2)
          examples:
            - "IN-KA"
        created_at:
          type: string
          format: date-time
          description: Job creation timestamp

    JobCreate:
      type: object
      required:
        - category_id
        - postcode
        - latitude
        - longitude
        - description
        - payment_method
        - jurisdiction_id
      properties:
        category_id:
          type: string
        postcode:
          type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        description:
          type: string
          maxLength: 2000
        scheduled_at:
          type: string
          format: date-time
        payment_method:
          $ref: "#/components/schemas/PaymentMethod"
        is_recurring:
          type: boolean
          default: false
        jurisdiction_id:
          type: string

    QuoteRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: double
          description: Quoted price
          minimum: 0
        currency:
          type: string
          description: ISO 4217 currency code
          default: INR
        message:
          type: string
          description: Optional message from the provider
          maxLength: 1000
        estimated_duration_minutes:
          type: integer
          description: Estimated job duration in minutes
          minimum: 1

    Quote:
      type: object
      required: [id, job_id, provider_id, amount, currency, status, created_at]
      properties:
        id:
          type: string
          description: Unique quote identifier
        job_id:
          type: string
          description: Job this quote is for
        provider_id:
          type: string
          description: Provider who submitted the quote
        amount:
          type: number
          format: double
        currency:
          type: string
        message:
          type: string
        estimated_duration_minutes:
          type: integer
        status:
          type: string
          enum: [pending, accepted, rejected, expired]
        created_at:
          type: string
          format: date-time

    # --- Categories ---
    Category:
      type: object
      required: [id, slug, name, is_active, requires_license]
      properties:
        id:
          type: string
          description: Unique category identifier
          examples:
            - "cat_plumbing"
        slug:
          type: string
          description: URL-friendly slug
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          examples:
            - "plumbing"
        name:
          type: string
          description: Human-readable category name
          examples:
            - "Plumbing"
        parent_id:
          type: string
          description: Parent category ID (null for top-level)
        icon:
          type: string
          description: Icon name / identifier
          examples:
            - "wrench"
        is_active:
          type: boolean
          description: Whether the category is currently active
          default: true
        requires_license:
          type: boolean
          description: Whether providers in this category require a professional license
          default: false

    # --- Reviews ---
    ReviewCreate:
      type: object
      required: [rating, comment]
      properties:
        rating:
          type: integer
          description: Rating from 1 to 5
          minimum: 1
          maximum: 5
        comment:
          type: string
          description: Review text
          maxLength: 2000

    Review:
      type: object
      required: [id, job_id, reviewer_id, reviewee_id, rating, comment, created_at]
      properties:
        id:
          type: string
          description: Unique review identifier
          examples:
            - "rev_01HS2NKFP3R7E3DYGZM2PFWT4C"
        job_id:
          type: string
          description: Job this review is for
        reviewer_id:
          type: string
          description: User who wrote the review
        reviewee_id:
          type: string
          description: User being reviewed
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating (1-5 stars)
        comment:
          type: string
          description: Review text
          maxLength: 2000
        created_at:
          type: string
          format: date-time
          description: Review creation timestamp

    # --- Disputes ---
    DisputeType:
      type: string
      enum: [quality, payment, no_show, misconduct, other]
      description: Type of dispute

    SeverityTier:
      type: string
      enum: [low, medium, high, critical]
      description: Severity tier of the dispute

    DisputeStatus:
      type: string
      enum: [open, under_review, resolved, escalated, closed]
      description: Current status of the dispute

    Evidence:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [photo, video, text, document]
          description: Type of evidence
        url:
          type: string
          format: uri
          description: URL of the evidence file (for photo, video, document)
        content:
          type: string
          description: Text content (for text type evidence)

    DisputeCreate:
      type: object
      required: [job_id, type, severity_tier, description]
      properties:
        job_id:
          type: string
          description: Job the dispute is about
        type:
          $ref: "#/components/schemas/DisputeType"
        severity_tier:
          $ref: "#/components/schemas/SeverityTier"
        description:
          type: string
          description: Detailed description of the dispute
          maxLength: 5000
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
          description: Supporting evidence

    Dispute:
      type: object
      required:
        - id
        - job_id
        - raised_by
        - type
        - severity_tier
        - status
        - description
      properties:
        id:
          type: string
          description: Unique dispute identifier
          examples:
            - "dsp_01HS8PKFP3R7E3DYGZM2PFWT4E"
        job_id:
          type: string
          description: Job the dispute is about
        raised_by:
          type: string
          description: User ID of the person who raised the dispute
        type:
          $ref: "#/components/schemas/DisputeType"
        severity_tier:
          $ref: "#/components/schemas/SeverityTier"
        status:
          $ref: "#/components/schemas/DisputeStatus"
        description:
          type: string
          description: Detailed description of the dispute
        resolution:
          type: string
          description: Resolution summary (populated when resolved)
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
          description: Evidence submitted with the dispute

    # --- Payments ---
    PaymentStatus:
      type: string
      enum: [created, authorized, captured, failed, refunded, partially_refunded]
      description: Payment lifecycle status

    Payment:
      type: object
      required: [id, job_id, amount, currency, status, created_at]
      properties:
        id:
          type: string
          description: Unique payment identifier
          examples:
            - "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
        job_id:
          type: string
          description: Job this payment is for
        amount:
          type: number
          format: double
          description: Payment amount
          examples:
            - 1500.00
        currency:
          type: string
          description: ISO 4217 currency code
          examples:
            - "INR"
        status:
          $ref: "#/components/schemas/PaymentStatus"
        gateway_ref:
          type: string
          description: Payment gateway reference ID
          examples:
            - "order_PmQ7R8sTuVwXyZ"
        created_at:
          type: string
          format: date-time
          description: Payment creation timestamp

    # --- Common ---
    PaginatedResponse:
      type: object
      required: [data, total, page, limit, has_more]
      properties:
        data:
          type: array
          items: {}
          description: Array of result items
        total:
          type: integer
          description: Total number of items matching the query
          examples:
            - 42
        page:
          type: integer
          description: Current page number (1-indexed)
          examples:
            - 1
        limit:
          type: integer
          description: Number of items per page
          examples:
            - 20
        has_more:
          type: boolean
          description: Whether more pages are available
          examples:
            - true

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
          examples:
            - "BAD_REQUEST"
        message:
          type: string
          description: Human-readable error message
          examples:
            - "Invalid request parameters"
        details:
          description: Additional error details (validation errors, etc.)
          oneOf:
            - type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
            - type: "null"

    # --- Notifications ---
    NotificationType:
      type: string
      enum:
        - job_new
        - job_accepted
        - job_completed
        - payment_received
        - review_received
        - dispute_update
        - points_earned
        - level_up
        - route_visit
        - seasonal_reminder

    Notification:
      type: object
      required: [id, type, title, body, created_at]
      properties:
        id:
          type: string
        type:
          $ref: "#/components/schemas/NotificationType"
        title:
          type: string
        body:
          type: string
        data:
          type: object
          description: Additional data (job_id, provider_id, etc.)
        channel:
          type: string
          enum: [push, sms, email]
        read_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    NotificationPreferences:
      type: object
      properties:
        push_enabled:
          type: boolean
          default: true
        sms_enabled:
          type: boolean
          default: true
        email_enabled:
          type: boolean
          default: false
        job_notifications:
          type: boolean
          default: true
        payment_notifications:
          type: boolean
          default: true
        marketing_notifications:
          type: boolean
          default: false

    # --- Gamification ---
    PointsBalance:
      type: object
      required: [balance, lifetime_earned]
      properties:
        balance:
          type: integer
          description: Current spendable balance
        lifetime_earned:
          type: integer
          description: Total points ever earned

    PointsEntry:
      type: object
      required: [id, points, reason, balance, created_at]
      properties:
        id:
          type: string
        points:
          type: integer
          description: Points change (positive for earned, negative for spent)
        reason:
          type: string
          enum:
            - job_completed
            - review_given
            - five_star_review
            - referral_provider
            - referral_customer
            - fast_response
            - early_adopter
            - provider_onboarded
            - job_posted
            - spent
        reference_type:
          type: string
        reference_id:
          type: string
        balance:
          type: integer
          description: Balance after this entry
        created_at:
          type: string
          format: date-time

    UserLevel:
      type: object
      required: [level, name, current_points, next_level_points]
      properties:
        level:
          type: integer
        name:
          type: string
          enum: [newcomer, rising_star, trusted, expert, master]
        current_points:
          type: integer
        next_level_points:
          type: integer
        jobs_completed:
          type: integer
        avg_rating:
          type: number
          format: double

    LeaderboardEntry:
      type: object
      required: [rank, user_id, name, points]
      properties:
        rank:
          type: integer
        user_id:
          type: string
        name:
          type: string
        points:
          type: integer
        level:
          type: string
        postcode:
          type: string

    # --- Routes ---
    RouteStatus:
      type: string
      enum: [active, paused, completed]

    Route:
      type: object
      required: [id, provider_id, name, postcode_area, interval_days, status, stop_count]
      properties:
        id:
          type: string
        provider_id:
          type: string
        name:
          type: string
        postcode_area:
          type: string
        max_stops:
          type: integer
        stop_count:
          type: integer
        interval_days:
          type: integer
          description: Days between visits (e.g., 30 for monthly)
        status:
          $ref: "#/components/schemas/RouteStatus"
        created_at:
          type: string
          format: date-time

    RouteCreate:
      type: object
      required: [name, postcode_area, interval_days]
      properties:
        name:
          type: string
        postcode_area:
          type: string
        max_stops:
          type: integer
          default: 20
        interval_days:
          type: integer
          minimum: 1
          maximum: 365

    RouteStop:
      type: object
      required: [id, route_id, customer_id, address, latitude, longitude, status]
      properties:
        id:
          type: string
        route_id:
          type: string
        customer_id:
          type: string
        customer_name:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        tree_count:
          type: integer
        area_sqft:
          type: number
        last_visited:
          type: string
          format: date-time
        next_visit:
          type: string
          format: date-time
        notes:
          type: string
        status:
          type: string
          enum: [active, paused, removed]

    RouteStopCreate:
      type: object
      required: [customer_id, address, latitude, longitude]
      properties:
        customer_id:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        tree_count:
          type: integer
        area_sqft:
          type: number
        notes:
          type: string

    RouteDetail:
      allOf:
        - $ref: "#/components/schemas/Route"
        - type: object
          properties:
            stops:
              type: array
              items:
                $ref: "#/components/schemas/RouteStop"

    ScheduledVisit:
      type: object
      required: [route_id, route_name, stop_id, customer_name, address, scheduled_date]
      properties:
        route_id:
          type: string
        route_name:
          type: string
        stop_id:
          type: string
        customer_name:
          type: string
        address:
          type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        scheduled_date:
          type: string
          format: date
        tree_count:
          type: integer
        notes:
          type: string

    # --- Search Results ---
    ProviderSearchResult:
      allOf:
        - $ref: "#/components/schemas/ProviderProfile"
        - type: object
          properties:
            name:
              type: string
            avatar_url:
              type: string
            distance_km:
              type: number
              format: double
            avg_rating:
              type: number
              format: double
            review_count:
              type: integer
            jobs_completed:
              type: integer
            match_score:
              type: number
              format: double
              description: Matching algorithm score (0-100)

    # --- Provider Dashboard ---
    ProviderDashboard:
      type: object
      properties:
        earnings_today:
          type: number
          format: double
        earnings_this_week:
          type: number
          format: double
        earnings_this_month:
          type: number
          format: double
        active_jobs:
          type: integer
        completed_this_month:
          type: integer
        trust_score:
          type: number
          format: double
        avg_rating:
          type: number
          format: double
        review_count:
          type: integer
        level:
          $ref: "#/components/schemas/ProviderLevel"
        upcoming_schedule:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledVisit"

    EarningsReport:
      type: object
      properties:
        total_earned:
          type: number
          format: double
        total_commission:
          type: number
          format: double
        total_tax:
          type: number
          format: double
        net_earnings:
          type: number
          format: double
        currency:
          type: string
        breakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              earned:
                type: number
                format: double
              jobs:
                type: integer

    RatingStats:
      type: object
      properties:
        avg_rating:
          type: number
          format: double
        total_reviews:
          type: integer
        distribution:
          type: object
          properties:
            "1":
              type: integer
            "2":
              type: integer
            "3":
              type: integer
            "4":
              type: integer
            "5":
              type: integer

    # --- KYC ---
    KYCDocument:
      type: object
      required: [id, user_id, document_type, file_url, status, submitted_at]
      properties:
        id:
          type: string
        user_id:
          type: string
        user_name:
          type: string
        document_type:
          type: string
          enum: [aadhaar, pan, driving_license, passport, selfie]
        file_url:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        rejection_reason:
          type: string
        submitted_at:
          type: string
          format: date-time

    # --- Admin ---
    AdminStats:
      type: object
      properties:
        total_users:
          type: integer
        total_providers:
          type: integer
        active_providers:
          type: integer
        total_jobs:
          type: integer
        jobs_today:
          type: integer
        revenue_this_month:
          type: number
          format: double
        open_disputes:
          type: integer
        pending_kyc:
          type: integer

    AnalyticsData:
      type: object
      properties:
        signups:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              count:
                type: integer
        jobs:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              created:
                type: integer
              completed:
                type: integer
        revenue:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date
              amount:
                type: number
                format: double
        top_categories:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              job_count:
                type: integer

    # --- AI ---
    AIChatResponse:
      type: object
      required: [message, conversation_id]
      properties:
        message:
          type: string
          description: AI response text
        conversation_id:
          type: string
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: [search_providers, create_job, show_quote, navigate]
              data:
                type: object
          description: Suggested actions for the client to execute

    PhotoAnalysis:
      type: object
      properties:
        category_id:
          type: string
          description: Suggested service category
        category_name:
          type: string
        description:
          type: string
          description: AI-generated problem description
        severity:
          type: string
          enum: [low, medium, high, urgent]
        estimated_price_range:
          type: object
          properties:
            min:
              type: number
              format: double
            max:
              type: number
              format: double
            currency:
              type: string
        recommendations:
          type: array
          items:
            type: string

    PriceEstimate:
      type: object
      properties:
        category:
          type: string
        postcode:
          type: string
        min_price:
          type: number
          format: double
        max_price:
          type: number
          format: double
        median_price:
          type: number
          format: double
        currency:
          type: string
        sample_size:
          type: integer
          description: Number of historical jobs used for the estimate
        confidence:
          type: number
          format: double
          description: Confidence score (0-1)
