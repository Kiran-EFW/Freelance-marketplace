  # ---------------------------------------------------------------------------
  # Payments
  # ---------------------------------------------------------------------------
  /api/v1/payments/create-order:
    post:
      operationId: createPaymentOrder
      summary: Create payment order
      description: Creates a payment order for a job. Returns gateway-specific details needed to complete the payment on the client.
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [job_id, amount, currency]
              properties:
                job_id:
                  type: string
                  description: ID of the job being paid for
                amount:
                  type: number
                  format: double
                  description: Payment amount
                currency:
                  type: string
                  description: ISO 4217 currency code
                  default: INR
            example:
              job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
              amount: 1500.00
              currency: INR
      responses:
        "201":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
              example:
                id: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
                job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                amount: 1500.00
                currency: INR
                status: created
                gateway_ref: "order_PmQ7R8sTuVwXyZ"
                created_at: "2026-03-17T12:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payments/verify:
    post:
      operationId: verifyPayment
      summary: Verify payment
      description: Verifies a payment after the client completes the gateway flow. Validates the payment signature and updates status.
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, gateway_ref, gateway_signature]
              properties:
                payment_id:
                  type: string
                  description: Internal payment ID
                gateway_ref:
                  type: string
                  description: Payment gateway reference / order ID
                gateway_signature:
                  type: string
                  description: Signature from the payment gateway for verification
            example:
              payment_id: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
              gateway_ref: "order_PmQ7R8sTuVwXyZ"
              gateway_signature: "a1b2c3d4e5f6..."
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
              example:
                id: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
                job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                amount: 1500.00
                currency: INR
                status: captured
                gateway_ref: "order_PmQ7R8sTuVwXyZ"
                created_at: "2026-03-17T12:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payments/{id}:
    get:
      operationId: getPayment
      summary: Get payment details
      description: Returns details for a specific payment.
      tags: [Payments]
      parameters:
        - $ref: "#/components/parameters/PaymentIdPath"
      responses:
        "200":
          description: Payment details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/payments/refund:
    post:
      operationId: requestRefund
      summary: Request refund
      description: Initiates a refund for a captured payment. Partial refunds are supported.
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id, amount, reason]
              properties:
                payment_id:
                  type: string
                  description: ID of the payment to refund
                amount:
                  type: number
                  format: double
                  description: Refund amount (may be partial)
                reason:
                  type: string
                  description: Reason for the refund
            example:
              payment_id: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
              amount: 1500.00
              reason: Job cancelled by customer before provider arrived
      responses:
        "200":
          description: Refund initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
              example:
                id: "pay_01HS5MKFP3R7E3DYGZM2PFWT4D"
                job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                amount: 1500.00
                currency: INR
                status: refunded
                gateway_ref: "order_PmQ7R8sTuVwXyZ"
                created_at: "2026-03-17T12:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Disputes
  # ---------------------------------------------------------------------------
  /api/v1/disputes:
    post:
      operationId: raiseDispute
      summary: Raise a dispute
      description: Raises a dispute against a job. Either customer or provider can raise a dispute.
      tags: [Disputes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisputeCreate"
            example:
              job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
              type: quality
              severity_tier: medium
              description: The repair was not done properly. Leak reappeared within 24 hours.
              evidence:
                - type: photo
                  url: https://storage.seva.io/evidence/img_001.jpg
                - type: text
                  content: Provider left without testing the fix.
      responses:
        "201":
          description: Dispute raised
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
              example:
                id: "dsp_01HS8PKFP3R7E3DYGZM2PFWT4E"
                job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                raised_by: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                type: quality
                severity_tier: medium
                status: open
                description: The repair was not done properly. Leak reappeared within 24 hours.
                resolution: null
                evidence:
                  - type: photo
                    url: https://storage.seva.io/evidence/img_001.jpg
                  - type: text
                    content: Provider left without testing the fix.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/disputes/{id}:
    get:
      operationId: getDispute
      summary: Get dispute details
      description: Returns full details for a specific dispute.
      tags: [Disputes]
      parameters:
        - $ref: "#/components/parameters/DisputeIdPath"
      responses:
        "200":
          description: Dispute details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/disputes/{id}/respond:
    put:
      operationId: respondToDispute
      summary: Respond to dispute
      description: Allows the other party (or admin) to respond to a dispute with their side of the story and evidence.
      tags: [Disputes]
      parameters:
        - $ref: "#/components/parameters/DisputeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [response]
              properties:
                response:
                  type: string
                  description: Response text
                evidence:
                  type: array
                  items:
                    $ref: "#/components/schemas/Evidence"
                  description: Supporting evidence
            example:
              response: I tested the pipe before leaving. The leak may be from a different joint. See attached photo.
              evidence:
                - type: photo
                  url: https://storage.seva.io/evidence/img_002.jpg
      responses:
        "200":
          description: Response recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/disputes/{id}/escalate:
    put:
      operationId: escalateDispute
      summary: Escalate dispute
      description: Escalates a dispute to a higher severity tier or to admin review.
      tags: [Disputes]
      parameters:
        - $ref: "#/components/parameters/DisputeIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Reason for escalation
                severity_tier:
                  $ref: "#/components/schemas/SeverityTier"
            example:
              reason: Provider is unresponsive and dispute has not been resolved for 5 days.
              severity_tier: high
      responses:
        "200":
          description: Dispute escalated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

