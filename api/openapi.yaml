openapi: 3.1.0
info:
  title: Seva API
  description: |
    API specification for the Seva platform.
    This is the single source of truth that generates Go server stubs,
    SvelteKit TypeScript client, and Flutter Dart client.
  version: 1.0.0
  contact:
    name: Platform Engineering
    email: engineering@seva.io
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.staging.seva.io
    description: Staging
  - url: https://api.seva.io
    description: Production

tags:
  - name: Health
    description: Service health and readiness checks
  - name: Auth
    description: Authentication via OTP and JWT tokens
  - name: Users
    description: User profile management
  - name: Providers
    description: Service provider profiles, search, and availability
  - name: Jobs
    description: Job lifecycle — creation, quoting, acceptance, completion, and reviews
  - name: Categories
    description: Service categories and subcategories
  - name: Payments
    description: Payment creation, verification, and refunds
  - name: Disputes
    description: Dispute resolution workflow
  - name: Reviews
    description: Job reviews and provider ratings
  - name: Notifications
    description: User notifications and preferences
  - name: Points
    description: Gamification — points, levels, and leaderboards
  - name: Routes
    description: Route management for crop and land service workers
  - name: Search
    description: Provider, job, and category search
  - name: Admin
    description: Admin dashboard, user management, and analytics
  - name: AI
    description: AI-powered features — chat booking, photo analysis, translation

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /api/v1/health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the basic health status of the service.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                timestamp: "2026-03-17T10:00:00Z"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/health/ready:
    get:
      operationId: readinessCheck
      summary: Readiness check
      description: |
        Returns whether the service is ready to accept traffic.
        Checks database connectivity, cache, and downstream dependencies.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: ready
                checks:
                  database: ok
                  cache: ok
                timestamp: "2026-03-17T10:00:00Z"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: not_ready
                checks:
                  database: ok
                  cache: failed
                timestamp: "2026-03-17T10:00:00Z"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /api/v1/auth/send-otp:
    post:
      operationId: sendOtp
      summary: Send OTP to phone number
      description: Sends a one-time password to the provided phone number for authentication.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OTPRequest"
            example:
              phone: "+919876543210"
              jurisdiction_id: "IN-KA"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                required: [message, expires_in]
                properties:
                  message:
                    type: string
                  expires_in:
                    type: integer
                    description: OTP validity in seconds
              example:
                message: OTP sent successfully
                expires_in: 300
        "400":
          $ref: "#/components/responses/BadRequest"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/verify-otp:
    post:
      operationId: verifyOtp
      summary: Verify OTP and get JWT tokens
      description: Verifies the OTP and returns access and refresh JWT tokens.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OTPVerify"
            example:
              phone: "+919876543210"
              otp: "482916"
      responses:
        "200":
          description: OTP verified, tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                refresh_token: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
                expires_in: 3600
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh access token
      description: Issues a new access token using a valid refresh token.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: The refresh token obtained from login
            example:
              refresh_token: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
      responses:
        "200":
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
              example:
                access_token: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.new...
                refresh_token: dGhpcyBpcyBhIG5ldyByZWZyZXNoIHRva2Vu...
                expires_in: 3600
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------
  /api/v1/users/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      description: Returns the profile of the currently authenticated user.
      tags: [Users]
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                type: customer
                phone: "+919876543210"
                email: priya@example.com
                name: Priya Sharma
                jurisdiction_id: "IN-KA"
                preferred_language: en
                device_type: android
                created_at: "2026-01-15T08:30:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      operationId: updateCurrentUser
      summary: Update current user profile
      description: Updates the profile of the currently authenticated user.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
            example:
              name: Priya S.
              email: priya.s@example.com
              preferred_language: kn
      responses:
        "200":
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/users/{id}:
    get:
      operationId: getUserById
      summary: Get user by ID
      description: Returns a user profile by ID. Restricted to admin users.
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/UserIdPath"
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Providers
  # ---------------------------------------------------------------------------
  /api/v1/providers/register:
    post:
      operationId: registerProvider
      summary: Register as provider
      description: Registers the current user as a service provider.
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderRegistration"
            example:
              skills:
                - plumbing
                - pipe-fitting
              service_radius_km: 15
              postcode: "560001"
              latitude: 12.9716
              longitude: 77.5946
      responses:
        "201":
          description: Provider registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
              example:
                user_id: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                skills:
                  - plumbing
                  - pipe-fitting
                service_radius_km: 15
                postcode: "560001"
                latitude: 12.9716
                longitude: 77.5946
                trust_score: 0.0
                level: beginner
                verification_status: pending
                availability_schedule: {}
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/providers/{id}:
    get:
      operationId: getProvider
      summary: Get provider profile
      description: Returns a provider's public profile.
      tags: [Providers]
      parameters:
        - $ref: "#/components/parameters/ProviderIdPath"
      responses:
        "200":
          description: Provider profile retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      operationId: updateProvider
      summary: Update provider profile
      description: Updates a provider's profile. Only the provider themselves or an admin may update.
      tags: [Providers]
      parameters:
        - $ref: "#/components/parameters/ProviderIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderUpdate"
            example:
              skills:
                - plumbing
                - pipe-fitting
                - bathroom-renovation
              service_radius_km: 20
      responses:
        "200":
          description: Provider profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/providers/search:
    get:
      operationId: searchProviders
      summary: Search providers
      description: |
        Search for service providers by location, category, skills, rating, and language.
        At least one of `postcode` or (`latitude` + `longitude`) must be provided.
      tags: [Providers]
      parameters:
        - name: postcode
          in: query
          description: Postcode / PIN code to search around
          schema:
            type: string
          example: "560001"
        - name: category
          in: query
          description: Category slug to filter by
          schema:
            type: string
          example: plumbing
        - name: latitude
          in: query
          description: Latitude of the search centre
          schema:
            type: number
            format: double
          example: 12.9716
        - name: longitude
          in: query
          description: Longitude of the search centre
          schema:
            type: number
            format: double
          example: 77.5946
        - name: radius
          in: query
          description: Search radius in kilometres (default 10)
          schema:
            type: number
            format: double
            default: 10
          example: 15
        - name: skills
          in: query
          description: Comma-separated list of skill slugs
          schema:
            type: string
          example: pipe-fitting,leak-repair
        - name: min_rating
          in: query
          description: Minimum average rating (1-5)
          schema:
            type: number
            format: double
            minimum: 1
            maximum: 5
          example: 4.0
        - name: language
          in: query
          description: Preferred language code (ISO 639-1)
          schema:
            type: string
          example: kn
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProviderProfile"
              example:
                data:
                  - user_id: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                    skills: [plumbing, pipe-fitting]
                    service_radius_km: 15
                    postcode: "560001"
                    latitude: 12.9716
                    longitude: 77.5946
                    trust_score: 4.8
                    level: expert
                    verification_status: verified
                    availability_schedule:
                      monday: { start: "09:00", end: "18:00" }
                total: 42
                page: 1
                limit: 20
                has_more: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/providers/{id}/availability:
    get:
      operationId: getProviderAvailability
      summary: Get provider availability
      description: Returns the availability schedule for a provider.
      tags: [Providers]
      parameters:
        - $ref: "#/components/parameters/ProviderIdPath"
      responses:
        "200":
          description: Provider availability retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySchedule"
              example:
                monday: { start: "09:00", end: "18:00" }
                tuesday: { start: "09:00", end: "18:00" }
                wednesday: { start: "09:00", end: "18:00" }
                thursday: { start: "09:00", end: "18:00" }
                friday: { start: "09:00", end: "17:00" }
                saturday: null
                sunday: null
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      operationId: updateProviderAvailability
      summary: Update provider availability
      description: Updates the availability schedule for a provider.
      tags: [Providers]
      parameters:
        - $ref: "#/components/parameters/ProviderIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilitySchedule"
            example:
              monday: { start: "09:00", end: "18:00" }
              tuesday: { start: "09:00", end: "18:00" }
              wednesday: { start: "09:00", end: "18:00" }
              thursday: { start: "09:00", end: "18:00" }
              friday: { start: "09:00", end: "17:00" }
              saturday: { start: "10:00", end: "14:00" }
              sunday: null
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilitySchedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ---------------------------------------------------------------------------
  # Jobs
  # ---------------------------------------------------------------------------
  /api/v1/jobs:
    post:
      operationId: createJob
      summary: Create a new job
      description: Creates a new job request from a customer.
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreate"
            example:
              category_id: "cat_plumbing"
              postcode: "560001"
              latitude: 12.9716
              longitude: 77.5946
              description: Kitchen sink leaking, need urgent repair
              scheduled_at: "2026-03-20T10:00:00Z"
              payment_method: online
              is_recurring: false
              jurisdiction_id: "IN-KA"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
              example:
                id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                customer_id: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                provider_id: null
                category_id: "cat_plumbing"
                postcode: "560001"
                latitude: 12.9716
                longitude: 77.5946
                status: pending
                description: Kitchen sink leaking, need urgent repair
                scheduled_at: "2026-03-20T10:00:00Z"
                quoted_price: null
                final_price: null
                currency: INR
                payment_method: online
                is_recurring: false
                jurisdiction_id: "IN-KA"
                created_at: "2026-03-17T10:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

    get:
      operationId: listJobs
      summary: List jobs
      description: Lists jobs with optional filters. Customers see their own jobs; providers see jobs assigned to them; admins see all.
      tags: [Jobs]
      parameters:
        - name: status
          in: query
          description: Filter by job status
          schema:
            $ref: "#/components/schemas/JobStatus"
        - name: customer_id
          in: query
          description: Filter by customer ID (admin only)
          schema:
            type: string
        - name: provider_id
          in: query
          description: Filter by provider ID
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category slug
          schema:
            type: string
        - name: postcode
          in: query
          description: Filter by postcode
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Jobs retrieved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}:
    get:
      operationId: getJob
      summary: Get job details
      description: Returns full details for a specific job.
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Job details retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/status:
    put:
      operationId: updateJobStatus
      summary: Update job status
      description: Updates the status of a job. Valid transitions depend on the current status and user role.
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/JobStatus"
                reason:
                  type: string
                  description: Optional reason for the status change
            example:
              status: cancelled
              reason: Customer requested cancellation
      responses:
        "200":
          description: Job status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/quote:
    post:
      operationId: submitQuote
      summary: Submit a quote for a job
      description: Allows a provider to submit a price quote for an open job.
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteRequest"
            example:
              amount: 1500.00
              currency: INR
              message: I can fix the leak within 2 hours. Parts included.
              estimated_duration_minutes: 120
      responses:
        "201":
          description: Quote submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
              example:
                id: "qte_01HRZFK8N4P7E3DYGZM2PFWT4B"
                job_id: "job_01HRZ3KFWBN9T1E7YGZM2PFWT4"
                provider_id: "usr_01HQXK5V8R3N0E7YGZM2PFWT4A"
                amount: 1500.00
                currency: INR
                message: I can fix the leak within 2 hours. Parts included.
                estimated_duration_minutes: 120
                status: pending
                created_at: "2026-03-17T11:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/accept:
    post:
      operationId: acceptJob
      summary: Accept a job
      description: A provider accepts an assigned or quoted job.
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                quote_id:
                  type: string
                  description: ID of the quote being accepted (if applicable)
            example:
              quote_id: "qte_01HRZFK8N4P7E3DYGZM2PFWT4B"
      responses:
        "200":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/v1/jobs/{id}/complete:
    post:
      operationId: completeJob
      summary: Mark job complete
      description: Marks a job as completed. Typically called by the provider after finishing the work.
      tags: [Jobs]
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                final_price:
                  type: number
                  format: double
                  description: Final price after completion (may differ from quote)
                notes:
                  type: string
                  description: Completion notes
            example:
              final_price: 1500.00
              notes: Replaced the washer and sealed the pipe joints.
      responses:
