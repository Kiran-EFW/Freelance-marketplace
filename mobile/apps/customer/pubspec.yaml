name: seva_customer
description: Seva Customer Mobile App - Find and book trusted service providers
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  seva_core:
    path: ../../packages/core
  seva_ui_kit:
    path: ../../packages/ui_kit
  go_router: ^14.6.2
  flutter_riverpod: ^2.6.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
