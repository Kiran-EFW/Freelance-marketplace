name: seva_mobile
repository: https://github.com/seva-platform/seva-mobile

packages:
  - packages/**
  - apps/**

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    description: Run dart analyzer across all packages
    run: melos exec -- "flutter analyze --no-fatal-infos"
    packageFilters:
      flutter: true

  test:
    description: Run tests in all packages
    run: melos exec -- "flutter test --coverage"
    packageFilters:
      dirExists: test

  format:
    description: Format all Dart files
    run: melos exec -- "dart format --set-exit-if-changed ."

  format:fix:
    description: Fix formatting in all Dart files
    run: melos exec -- "dart format ."

  build:android:customer:
    description: Build Customer app for Android
    run: |
      cd apps/customer && flutter build apk --release
    packageFilters:
      scope: seva_customer

  build:android:provider:
    description: Build Provider app for Android
    run: |
      cd apps/provider && flutter build apk --release
    packageFilters:
      scope: seva_provider

  build:ios:customer:
    description: Build Customer app for iOS
    run: |
      cd apps/customer && flutter build ios --release --no-codesign
    packageFilters:
      scope: seva_customer

  build:ios:provider:
    description: Build Provider app for iOS
    run: |
      cd apps/provider && flutter build ios --release --no-codesign
    packageFilters:
      scope: seva_provider

  clean:
    description: Clean all packages
    run: melos exec -- "flutter clean"

  gen:
    description: Run build_runner in all packages
    run: melos exec -- "dart run build_runner build --delete-conflicting-outputs"
    packageFilters:
      dependsOn: build_runner
