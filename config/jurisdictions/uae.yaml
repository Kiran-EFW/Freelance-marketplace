# UAE Jurisdiction Configuration
# Governs currency, payment, verification, and compliance rules
# for the United Arab Emirates market.

jurisdiction:
  code: AE
  name: United Arab Emirates
  timezone: Asia/Dubai

currency:
  code: AED
  symbol: "AED"
  symbol_ar: "\u062F.\u0625"
  decimal_places: 2
  min_job_value: 50.00
  max_job_value: 100000.00
  vat_rate: 0.05

payment:
  provider: tap_payments
  tap:
    country: AE
    supported_methods:
      - card
      - apple_pay
      - samsung_pay
      - knet
      - benefit
    supported_card_brands:
      - visa
      - mastercard
      - amex
      - mada
    payout_schedule: weekly
    payout_delay_days: 5
    min_payout_amount: 100.00
    platform_fee_percent: 10.0
  # Fallback/additional
  stripe:
    country: AE
    enabled: false

verification:
  provider: emirates_id
  kyc_required: true
  kyc_methods:
    - emirates_id
    - passport_with_visa
    - manual_document
  required_documents:
    individual:
      - emirates_id
      - valid_visa_or_residency
    business:
      - trade_license
      - emirates_id_of_owner
      - establishment_card
  background_check:
    enabled: true
    provider: manual
    check_type: standard
    validity_months: 24
  work_permit:
    enabled: true
    # Providers must have valid UAE work permit / freelance visa
    freelance_permit_accepted: true
    accepted_free_zones:
      - Dubai Silicon Oasis
      - Dubai Internet City
      - Abu Dhabi Global Market
      - RAKEZ

compliance:
  data_protection:
    regulation: UAE Federal Decree-Law No. 45 of 2021
    data_retention_months: 24
    data_residency: UAE
    data_center_region: me-south-1  # AWS Bahrain or UAE
    cookie_consent_required: true

  trade_regulations:
    electrical:
      certification_required: true
      certifications:
        - DEWA approved (Dubai)
        - ADDC approved (Abu Dhabi)
    plumbing:
      certification_required: true
      certifications:
        - Municipality approved
    ac_maintenance:
      certification_required: true
      certifications:
        - HVAC technician license
    pest_control:
      certification_required: true
      certifications:
        - Dubai Municipality pest control license
    cleaning:
      certification_required: false
      health_card_required: true

  # Municipality regulations
  municipality:
    permit_required_for:
      - construction
      - painting_exterior
      - structural_modification
    noise_restrictions:
      start: "08:00"
      end: "22:00"
      friday_start: "14:00"  # After Friday prayers

  insurance:
    public_liability:
      required: true
      min_coverage: 500000

languages:
  primary: ar
  supported:
    - ar
    - en
    - hi
    - ur
    - tl  # Tagalog
    - ml  # Malayalam
  sms_language: en  # Default SMS language, user preference overrides
  rtl_languages:
    - ar
    - ur

contact:
  support_phone: "+971 800 SEVA"
  support_phone_numeric: "+971 800 7382"
  support_email: support-uae@seva.app
  support_whatsapp: "+971 50 000 0000"
  business_hours:
    start: "08:00"
    end: "21:00"
    timezone: Asia/Dubai
    days: [0, 1, 2, 3, 4, 5, 6]  # All days
  # Friday is the weekend/holy day but services still operate

seo:
  domain: seva.ae
  default_city: Dubai
  currency_format: "{symbol} {amount}"
  number_format:
    thousands_separator: ","
    decimal_separator: "."

# Ramadan-specific configuration
seasonal:
  ramadan:
    adjust_working_hours: true
    working_hours:
      start: "10:00"
      end: "16:00"
      evening_start: "20:00"
      evening_end: "02:00"
    surge_categories:
      - cleaning
      - catering
      - decoration
