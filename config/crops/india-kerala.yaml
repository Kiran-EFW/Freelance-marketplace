      flowering_months: [5, 6, 7]
      planting_season: [6, 7]
      fertilizer_schedule: [5, 9]
    common_work_types:
      - type: "vine_training"
        description: "Training pepper vines on standards"
        typical_pricing_model: "per_unit"
        unit: "per_vine"
        typical_rate_range:
          min: 10
          max: 30
          currency: "INR"
      - type: "harvesting"
        description: "Picking pepper berries from vines"
        typical_pricing_model: "hourly"
        unit: "per_day"
        typical_rate_range:
          min: 700
          max: 1200
          currency: "INR"
      - type: "drying_processing"
        description: "Drying and processing harvested pepper"
        typical_pricing_model: "per_unit"
        unit: "per_kg"
        typical_rate_range:
          min: 5
          max: 15
          currency: "INR"
      - type: "disease_treatment"
        description: "Quick wilt and phytophthora treatment"
        typical_pricing_model: "per_unit"
        unit: "per_vine"
        typical_rate_range:
          min: 20
          max: 50
          currency: "INR"

