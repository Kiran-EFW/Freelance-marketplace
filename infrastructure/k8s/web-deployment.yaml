apiVersion: apps/v1
kind: Deployment
metadata:
  name: seva-web
  namespace: seva
  labels:
    app: seva-web
    app.kubernetes.io/name: seva-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: seva-web
  template:
    metadata:
      labels:
        app: seva-web
        app.kubernetes.io/name: seva-web
    spec:
      terminationGracePeriodSeconds: 15

      containers:
        - name: web
          image: ${ECR_REGISTRY}/seva/web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: seva-config
                  key: WEB_ORIGIN
            - name: PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: seva-config
                  key: PUBLIC_API_URL

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
