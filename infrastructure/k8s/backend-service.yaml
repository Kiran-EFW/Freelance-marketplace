apiVersion: v1
kind: Service
metadata:
  name: seva-backend
  namespace: seva
  labels:
    app: seva-backend
    app.kubernetes.io/name: seva-backend
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: seva-backend
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
