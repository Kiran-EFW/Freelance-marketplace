apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seva-ingress
  namespace: seva
  labels:
    app.kubernetes.io/name: seva
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://seva.app,https://www.seva.app"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - seva.app
        - www.seva.app
        - api.seva.app
      secretName: seva-tls
  rules:
    # API backend
    - host: api.seva.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seva-backend
                port:
                  name: http

    # Web frontend
    - host: seva.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seva-web
                port:
                  name: http

    # WWW redirect handled by web app
    - host: www.seva.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: seva-web
                port:
                  name: http
