# Template for Seva secrets. DO NOT commit with real values.
# Populate via: kubectl create secret generic seva-secrets --from-env-file=.env -n seva
# Or use a secrets manager (AWS Secrets Manager, Vault, etc.)

apiVersion: v1
kind: Secret
metadata:
  name: seva-secrets
  namespace: seva
  labels:
    app.kubernetes.io/name: seva
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://seva_admin:CHANGE_ME@seva-db.cluster-xxx.ap-south-1.rds.amazonaws.com:5432/seva?sslmode=require"

  # Redis
  REDIS_URL: "rediss://:CHANGE_ME@seva-redis.xxx.apso1.cache.amazonaws.com:6379"

  # Authentication
  JWT_SECRET: "CHANGE_ME_TO_A_64_CHAR_RANDOM_STRING"
  JWT_REFRESH_SECRET: "CHANGE_ME_TO_ANOTHER_64_CHAR_RANDOM_STRING"
  OTP_SECRET: "CHANGE_ME_OTP_HMAC_SECRET"

  # SMS Provider (MSG91 / Twilio)
  SMS_API_KEY: "CHANGE_ME"
  SMS_SENDER_ID: "SEVAPP"

  # Payment Provider
  STRIPE_SECRET_KEY: "sk_live_CHANGE_ME"
  STRIPE_WEBHOOK_SECRET: "whsec_CHANGE_ME"

  # Cloudflare R2 (S3-compatible storage)
  S3_ACCESS_KEY_ID: "CHANGE_ME"
  S3_SECRET_ACCESS_KEY: "CHANGE_ME"
  S3_ENDPOINT_URL: "https://ACCOUNT_ID.r2.cloudflarestorage.com"

  # AI / ML
  ANTHROPIC_API_KEY: "sk-ant-CHANGE_ME"

  # Push Notifications (Firebase)
  FIREBASE_SERVICE_ACCOUNT_JSON: "{}"

  # Gov.UK Verify / Emirates ID (KYC)
  KYC_API_KEY: "CHANGE_ME"
