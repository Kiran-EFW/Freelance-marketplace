version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: seva-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seva
      POSTGRES_PASSWORD: seva_dev
      POSTGRES_DB: seva
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seva -d seva"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - seva

  redis:
    image: redis:7-alpine
    container_name: seva-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - seva

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: seva-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: seva_meili_dev_key
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - seva

  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: seva-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      APP_PORT: "8080"
      DATABASE_URL: "postgres://seva:seva_dev@postgres:5432/seva?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      MEILISEARCH_URL: "http://meilisearch:7700"
      MEILISEARCH_KEY: "seva_meili_dev_key"
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      SMS_PROVIDER: "mock"
      PAYMENT_PROVIDER: "mock"
      LOG_LEVEL: "debug"
      LOG_FORMAT: "text"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - seva

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: seva-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PUBLIC_API_URL: "http://localhost:8080"
      ORIGIN: "http://localhost:3000"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ../../web/src:/app/src:delegated
      - ../../web/static:/app/static:delegated
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - seva

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  seva:
    name: seva-network
    driver: bridge
